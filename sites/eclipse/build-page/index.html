<!DOCTYPE html>
<html>

<head>
	<!--TODO: set proper title and metadata -->
	<title>Documentation | Eclipse Project</title>
	<link rel="preconnect stylesheet" href="../page.css" />
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<!-- TODO: check if this is necessary script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script-->
	<script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>
	<script src="../page.js"></script>
	<!-- TODO: can we unify this further without having a (visible) redirect? -->
</head>

<body>
	<div data-generate="generateDefaultBreadcrumb(this)">
		<a href="..">Downloads</a> <span class="data-ref">${label}</span>
	</div>
	<!-- TODO: Always generate the default headers? -->
	<div data-generate="generateDefaultHeader(this)"></div>
	<!--div data-generate="generateDefaultAside(this)"></div-->
	<!-- TODO: Make the TOC configurable, e.g. considered heading levels. E.g. here we don't want the very first head-line but the different build kind headlines? -->
	<div data-generate="generateTOCAside(this)"></div>

	<main>
		<div id="markdown-target"></div>
	</main>
	<script>
		loadContentData('data.json')

		markdownPostProcessor = (markdownElement, contentData) => {
			const testConfigs = contentData.expectedTests
			const reultsSummaryURLs = testConfigs.map(c => `testresults/ep437I-unit-${c}.json`)
			const testResultsSummary = fetchAllJSON(reultsSummaryURLs)
			const testResultsTablePlaceholders = (markdownElement.getElementsByClassName("test-results-summary-table"))
			if (testResultsTablePlaceholders.length != 1) {
				throw new Error("Not exactly one test-results-summary-table found: " + testResultsTablePlaceholders.length)
			}
			const table = toElement(`
				<table class="test-results-summary-table">
					<thead>
						<tr>
							<th>Tested Platform</th>
							<th>Failed</th>
							<th>Passed</th>
							<th>Total</th>
							<th>Test Time (s)</th><!-- TODO: change this to minutes or just show the time at the values -->
						</tr>
					</thead>
					<tr> <!-- The template row, which is replicated for each data-set and has its referenced with that data-set's values -->
						<td class="data-ref">\${name}</td>
						<td class="data-ref">\${failCount}</td>
						<td class="data-ref">\${passCount}</td>
						<td class="data-ref">\${totalCount}</td>
						<td class="data-ref">\${duration}</td>
					</tr>
				</table>`)
			testResultsTablePlaceholders[0].replaceWith(table)
			const tbody = table.tBodies[0]
			const templateRow = tbody.rows[0]
			//TODO: create template row separatly to avoid the need to remove it?
			testResultsSummary.then(testResults => {
				for (let r = 0; r < testResults.length; r++) {
					const result = testResults[r]
					result['name'] = testConfigs[r]
					if (!result.duration) { // Test configuration not yet completed
						//TODO: if we add the row a separate element we could have a completly other row that e.g. links the job (or at least it's definition')
						// Then we can have just one element spanning the entire row linking to Jenkins
						// It shouldn't be linked permanently as the link is dead after the release.
						result['duration'] = ''
						result['passCount'] = ''
						result['failCount'] = ''
						result['totalCount'] = ''
					} else {
						result['totalCount'] = result.passCount + result.failCount
					}
					const row = templateRow.cloneNode(true)
					resolveDataReferences(row, result)
					tbody.appendChild(row)
				}
				tbody.deleteRow(0) // Remove the template row
			})
		}

		//TODO: set page name here and use it bread-crump and TOC
		generate();
		// TODO: Define the path here as argument?
		//TODO: Define the resources to load in this file (ideally as async load/promise so that they can be replace in the page when loaded)
		// Reference the resources through corresponding html elements in the markdown
	</script>
</body>

</html>
