<!DOCTYPE html>
<html>

<head>
	<!--TODO: set proper title and metadata -->
	<title>Documentation | Eclipse Project</title>
	<link rel="preconnect stylesheet" href="../page.css" />
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<!-- TODO: check if this is necessary script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script-->
	<script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>
	<script src="../page.js"></script>
	<!-- TODO: can we unify this further without having a (visible) redirect? -->
</head>

<body>
	<div data-generate="generateDefaultBreadcrumb(this)">
		<a href="..">Downloads</a> <span class="data-ref">${label}</span>
	</div>
	<!-- TODO: Always generate the default headers? -->
	<div data-generate="generateDefaultHeader(this)"></div>
	<!--div data-generate="generateDefaultAside(this)"></div-->
	<!-- TODO: Make the TOC configurable, e.g. considered heading levels. E.g. here we don't want the very first head-line but the different build kind headlines? -->
	<div data-generate="generateTOCAside(this)"></div>

	<main>
		<div id="markdown-target"></div>
	</main>
	<script>
		loadContentData('buildproperties.json')

		markdownPostProcessor = (markdownElement, buildProperties) => {

			// Inject test results
			const testConfigs = buildProperties.expectedTests
			const buildType = buildProperties.identifier.startsWith('Y') ? 'Y' : 'I'
			const jobNamePrefix = `ep${buildProperties.releaseShort.replace('.', '')}${buildType}-unit`
			const testJobFolderName = buildType == 'I' ? 'AutomatedTests' : 'YBuilds'

			const testResultsSummary = fetchAllJSON(testConfigs.map(c => `testresults/${jobNamePrefix}-${c}.json`))
			const testResultsTable = document.getElementById("test-results-summary-table")
			const tBody = testResultsTable.createTBody()
			testResultsSummary.then(testResults => {
				for (let r = 0; r < testResults.length; r++) {
					const row = tBody.insertRow()
					const result = testResults[r]
					const testName = testConfigs[r]
					result['name'] = testName
					if (result.duration) { // Test configuration completed
						//TODO: compute nicer label
						row.innerHTML = `
							<td>${testName}</td>
							<td>${result.failCount}</td>
							<td>${result.passCount}</td>
							<td>${result.passCount + result.failCount}</td>
							<td>${result.duration}</td>
						`
					} else {
						const jobName = `${jobNamePrefix}-${testConfigs[r]}`
						row.innerHTML = `
							<td>${testName}</td>
							<td colspan="4"> Test job is running at <a href="https://ci.eclipse.org/releng/job/${testJobFolderName}/job/${jobName}/">${jobName}</a></td>
						`
					}
					resolveDataReferences(row, result)
				}
			})

			// Inject resource files
			const dataTables = Array.from(markdownElement.getElementsByClassName("files-table"))
			for (const tablePlaceholder of dataTables) {
				const dataPath = tablePlaceholder.getAttribute('data-path');
				const filesData = getValue(buildProperties, dataPath)
				const table = toElement(`
				<table class="files-table">
					<thead>
						<tr>
							<th>Platform</th>
							<th style="width:50%">Download</th>
							<th>Size</th>
						</tr>
					</thead>
				</table>`)
				tablePlaceholder.replaceWith(table)
				const tBody = table.createTBody()
				for (const file of filesData) {
					tBody.insertRow().innerHTML = `
					<td>	${file.label ? file.label : getPlatformLabel(file.name)}</td>
					<td>
						<a href="https://www.eclipse.org/downloads/download.php?file=eclipse/downloads/drops4/${buildProperties.identifier}/${file.name}">${file.name}</a>
					</td>
					<td>${file.size}</td>
					`
				}
			}
		}

		function getPlatformLabel(fileName) {
			let os;
			if (fileName.indexOf('-win32-') !== -1) {
				os = 'Windows'
			} else if (fileName.indexOf('-linux-') !== -1) {
				os = 'Linux'
			} else if (fileName.indexOf('-macosx-') !== -1) {
				os = 'Mac OSX'
			} else {
				throw new Error('Cannot determine OS from filename: ' + fileName)
			}
			let arch;
			if (fileName.indexOf('-x86_64-')) {
				arch = 'x86 64-bit'
			} else if (fileName.indexOf('-aarch64-') !== -1) {
				arch = 'ARM 64-bit'
			} else if (fileName.indexOf('-ppc64le-') !== -1) {
				arch = 'PowerPC 64-bit'
			} else if (fileName.indexOf('-riscv64-') !== -1) {
				arch = 'RISC-V 64-bit'
			} else {
				throw new Error('Cannot determine OS from filename: ' + fileName)
			}
			return `${os} (${arch})`
		}

		//TODO: set page name here and use it bread-crump and TOC
		generate();
		// TODO: Define the path here as argument?
		//TODO: Define the resources to load in this file (ideally as async load/promise so that they can be replace in the page when loaded)
		// Reference the resources through corresponding html elements in the markdown
	</script>
</body>

</html>
