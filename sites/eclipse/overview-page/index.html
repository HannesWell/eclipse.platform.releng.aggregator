<!DOCTYPE html>
<html>

<head>
	<!--TODO: set proper title and metadata -->
	<title>Documentation | Eclipse Project</title>
	<link rel="preconnect stylesheet" href="../page.css" />
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
	<!-- TODO: check if this is necessary script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script-->
	<script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>
	<script src="../page.js"></script>
	<!-- TODO: can we unify this further without having a (visible) redirect? -->
</head>

<body>
	<div data-generate="generateDefaultBreadcrumb(this)">
		<!-- TODO: Add just the downloads element here -->
		<span>Downloads</span>
	</div>
	<!-- TODO: Always generate the default headers? -->
	<div data-generate="generateDefaultHeader(this)"></div>
	<!--div data-generate="generateDefaultAside(this)"></div-->
	<!-- TODO: Make the TOC configurable, e.g. considered heading levels. E.g. here we don't want the very first head-line but the different build kind headlines? -->
	<div data-generate="generateTOCAside(this)"></div>

	<main>
		<div id="markdown-target"></div>
	</main>
	<script>
		loadContentData('data.json')

		markdownPostProcessor = (markdownElement, contentData) => {
			const dataTables = Array.from(markdownElement.getElementsByClassName("builds-table"))
			for (const tablePlaceholder of dataTables) {
				const dataPath = tablePlaceholder.getAttribute('data-path');
				const tableData = getValue(contentData, dataPath)
				const table = toElement(`
				<table class="builds-table">
					<thead>
						<tr>
							<th>Build Name</th>
							<th>Build Status</th>
							<th>Build Date (UTC)</th>
						</tr>
					</thead>
				</table>`)
				tablePlaceholder.replaceWith(table)
				const tBody = table.createTBody()
				for (const dataRow of tableData) {
					const row = tBody.insertRow()

					const date = getBuildDate(dataRow)
					row.innerHTML = `
					<td>
						<a href="${dataRow.path}">${dataRow.label}</a>
					</td>
					<td>
						<a href="${dataRow.path}">
							<img src="${dataRow.statusIcon}" title="Build is available" alt="Build is available">
						</a>
						<a href="${dataRow.testsPath}" title="${dataRow.testsCompletion} test platforms finished." style="text-decoration: none">
							<img src="${dataRow.testsIcon}"/>
							(${dataRow.testsCompletion} tests completed)
						</a>
					</td>
					<td>${date}</td>
					`
				}
			}
		}

		function getBuildDate(buildData) {
			let date = buildData.date;
			const year = parseInt(date.substring(0, 4))
			const month = parseInt(date.substring(5, 7)) - 1
			const day = parseInt(date.substring(8, 10))
			const hour = parseInt(date.substring(11, 13))
			const minute = parseInt(date.substring(14, 16))
			const dateUTC = new Date(Date.UTC(year, month, day, hour, minute));
			return new Intl.DateTimeFormat("en-GB", {
				timeZone: "UTC",
				year: "numeric",
				month: "short",
				day: "2-digit",
				weekday: "short",
				hour12: false,
				hour: "2-digit",
				minute: "2-digit",
			}).format(dateUTC)
		}

		//TODO: set page name here and use it bread-crump and TOC
		generate();
		// TODO: Define the path here as argument?
		//TODO: Define the resources to load in this file (ideally as async load/promise so that they can be replace in the page when loaded)
		// Reference the resources through corresponding html elements in the markdown
	</script>
</body>

</html>
